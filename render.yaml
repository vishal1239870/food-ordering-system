services:
  # Python Backend Service
  - type: web
    name: foodhub-backend
    runtime: python
    rootDirectory: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///:memory:
      - key: PYTHON_VERSION
        value: 3.11.9

  # React Frontend Service
  - type: web
    name: foodhub-frontend
    runtime: static
    rootDirectory: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://food-ordering-system-7ffq.onrender.com
      - key: VITE_WS_URL
        value: wss://food-ordering-system-7ffq.onrender.com

