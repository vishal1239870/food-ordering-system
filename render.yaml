services:
  # Python Backend Service
  - type: web
    name: foodhub-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///:memory:
      - key: PYTHON_VERSION
        value: 3.11.9

  # React Frontend Service
  - type: web
    name: foodhub-frontend
    runtime: static
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://foodhub-backend.onrender.com/api # Replace with your actual backend URL after deployment
