services:
  # Python Backend Service
  - type: web
    name: foodhub-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free # Change to starter or higher if needed
    envVars:
      - key: MONGODB_URL
        value: mongodb+srv://ff465593_db_user:user123@cluster0.znxgasq.mongodb.net/?appName=Cluster0
      - key: MONGODB_DB_NAME
        value: foodhub
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: GOOGLE_CLIENT_ID
        value: 776496181430-gngmbae78t5g2rbbpan1paq7uhoqc2or.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_SECRET
        sync: false # User should set this in Render Dashboard for security

  # React Frontend Service
  - type: web
    name: foodhub-frontend
    runtime: docker
    dockerContext: frontend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://food-ordering-system-7ffq.onrender.com
      - key: VITE_WS_URL
        value: wss://food-ordering-system-7ffq.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: 776496181430-gngmbae78t5g2rbbpan1paq7uhoqc2or.apps.googleusercontent.com
